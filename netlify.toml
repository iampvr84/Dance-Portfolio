[build]
  publish = "."

[[redirects]]
  from = "/about"
  to   = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to   = "/pages/gallery.html"
  status = 200

[[redirects]]
  from = "/repertoire"
  to   = "/pages/repertoire.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/pages/contact.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
